<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-label="Cute smiling stack of pancakes with butter and syrup">
  <defs>
    <linearGradient id="cake" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6b64a"/>
      <stop offset="1" stop-color="#e08a2a"/>
    </linearGradient>
    <linearGradient id="cakeTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8c266"/>
      <stop offset="1" stop-color="#efa845"/>
    </linearGradient>
    <linearGradient id="butter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff4b8"/>
      <stop offset="1" stop-color="#f5d867"/>
    </linearGradient>
    <linearGradient id="syrup" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c9791f"/>
      <stop offset="1" stop-color="#a85c12"/>
    </linearGradient>
  </defs>

  <!-- plate -->
  <ellipse cx="200" cy="330" rx="170" ry="42" fill="#e9edf2"/>
  <ellipse cx="200" cy="323" rx="170" ry="42" fill="#ffffff"/>
  <ellipse cx="200" cy="323" rx="120" ry="26" fill="#eef1f5"/>

  <!-- bottom pancake -->
  <ellipse cx="200" cy="292" rx="132" ry="40" fill="url(#cake)" stroke="#8a4a12" stroke-width="4"/>
  <!-- middle pancake -->
  <ellipse cx="200" cy="256" rx="126" ry="38" fill="url(#cake)" stroke="#8a4a12" stroke-width="4"/>
  <!-- upper pancake -->
  <ellipse cx="200" cy="222" rx="120" ry="36" fill="url(#cake)" stroke="#8a4a12" stroke-width="4"/>
  <!-- top pancake with face -->
  <ellipse cx="200" cy="188" rx="114" ry="40" fill="url(#cakeTop)" stroke="#8a4a12" stroke-width="4"/>

  <!-- syrup drips -->
  <path d="M92 196 q-6 26 4 40 q10 -4 10 -20 q0 -12 -14 -20z" fill="url(#syrup)" opacity="0.9"/>
  <path d="M300 200 q10 24 2 44 q-12 -2 -12 -22 q0 -12 10 -22z" fill="url(#syrup)" opacity="0.9"/>
  <path d="M150 214 q-4 34 6 54 q10 -6 8 -26 q-2 -16 -14 -28z" fill="url(#syrup)" opacity="0.85"/>
  <path d="M250 220 q8 30 0 52 q-10 -4 -8 -26 q2 -14 8 -26z" fill="url(#syrup)" opacity="0.85"/>

  <!-- butter -->
  <g>
    <rect x="168" y="118" width="64" height="40" rx="8" fill="url(#butter)" stroke="#d8b23f" stroke-width="3"/>
    <path d="M168 126 l64 0 l0 -14 l-64 14z" fill="#fffbe0" opacity="0.8"/>
  </g>

  <!-- face -->
  <circle cx="170" cy="184" r="8.5" fill="#3a2410"/>
  <circle cx="172" cy="181" r="3" fill="#fff"/>
  <circle cx="230" cy="184" r="8.5" fill="#3a2410"/>
  <circle cx="232" cy="181" r="3" fill="#fff"/>
  <path d="M182 198 q18 16 36 0" fill="none" stroke="#3a2410" stroke-width="4.5" stroke-linecap="round"/>
  <ellipse cx="152" cy="196" rx="10" ry="6" fill="#f4998c" opacity="0.55"/>
  <ellipse cx="248" cy="196" rx="10" ry="6" fill="#f4998c" opacity="0.55"/>
</svg>
